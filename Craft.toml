[package]
name = "raylib"
version = "0.1.0"
kern = "0.7.2"
description = "Kern bindings for raylib"
readme = "README.md"
license = "MIT"

[lib]
root = "src/lib.rn"

[build-dependencies]
raylib-bindgen = { path = "tools/raylib-bindgen", package = "raylib-bindgen" }

[example]
roots = [
    "examples/basic_window.rn",
]

[test]
roots = ["tests/smoke.rn"]

[resources]
raylib = { git = "https://github.com/raysan5/raylib.git", tag = "6.0" }
